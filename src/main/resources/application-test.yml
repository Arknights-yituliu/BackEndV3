#启动端口
server:
  port: 10012

spring:
  #  数据库配置
  datasource:
    type: com.zaxxer.hikari.HikariDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    #  数据库链接
    url: jdbc:mysql://localhost:3306/数据库名?serverTimezone=GMT%2B8&characterEncoding=utf-8&useSSL=false&rewriteBatchedStatements=true
    #  账号
    username: 数据库账号
    #  密码
    password: 数据库密码

  data:
    #reids配置
    redis:
      #  redis所在服务器ip
      host: 127.0.0.1
      #  redis默认端口
      port: 6379
      # password: 有redis密码就放开这个属性填入密码
      database: 0
      connect-timeout: 1800000
      lettuce:
        pool:
          max-active: 20
          max-wait: -1
          max-idle: 5
          min-idle: 0
  mail:
    host: smtp.163.com
    port: 465
    username: 邮箱名
    password: 密钥
    default-encoding: utf-8
    properties:
      mail:
        smtp:
          socketFactory:
            port: 465
          socketFactoryClass: javax.net.ssl.SSLSocketFactory
          ssl:
            enable: true
    protocol: smtp

#资源路径
resourcesPath:
  penguin: src/main/resources/penguin/
  config: src/main/resources/config/
  backup: src/main/resources/backup/

#AES密匙和签名值
encryption:
  secret: 密匙
  signKey: 签名

#企鹅物流API
penguin:
  auto: 企鹅物流API
  global: https://penguin-stats.io/PenguinStats/api/v2/result/matrix?show_closed_zones=true

tencent:
  secretId: 密匙
  secretKey: 签名

# 森空岛API
skland:
  playerInfoAPI: skdAPI
  playerBindingAPI: skdAPI

#mybatis-plus:
#  configuration:
#    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

#  是否开启swagger文档
swagger2:
  enable: true



